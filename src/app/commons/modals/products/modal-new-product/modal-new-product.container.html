<app-modal-new-product-ui
  [isLoading]="(isLoading$ | async)!"
  [visibleModal]="visibleModal"
  [brands]="brands"
  [categories]="categories"
  [colors]="colors"
  [product]="product"
  [units]="units"
  (closeEmit)="close()"
  (saveProductEmit)="saveProduct($event)"
  (updateProductEmit)="updateProduct($event)"
></app-modal-new-product-ui>
