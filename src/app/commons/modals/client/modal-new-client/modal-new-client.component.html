<p-dialog
  [(visible)]="visibleModal"
  appendTo="body"
  [modal]="true"
  [breakpoints]="{ '960px': '75vw', '640px': '90vw' }"
  [style]="{ width: '52vw' }"
  [draggable]="false"
  [resizable]="false"
  styleClass="client-dialog"
>
  <ng-template pTemplate="header">
    <div class="dialog-header">
      <div class="dialog-header__icon">
        <i class="pi pi-user"></i>
      </div>
      <div class="dialog-header__text">
        <span class="dialog-header__subtitle">
          {{
            client
              ? "Modifica los datos del cliente"
              : "Completa los datos para registrar un nuevo cliente"
          }}
        </span>
      </div>
    </div>
  </ng-template>

  <form [formGroup]="clientPresenter.Form">
    <div class="form-section">
      <div class="form-section__label mb-3">
        <i class="pi pi-id-card mr-2"></i>
        <span>Identificación</span>
      </div>
      <div class="grid formgrid p-fluid">
        <div class="field col-12 md:col-4">
          <label for="typeDocument" class="field-label"
            >Tipo de documento</label
          >
          <p-dropdown
            inputId="typeDocument"
            [options]="documentsType"
            optionValue="id"
            formControlName="typeDocument"
            optionLabel="name"
            placeholder="Seleccione"
          ></p-dropdown>
        </div>
        <div class="field col-12 md:col-8">
          <label for="document" class="field-label">Número de documento</label>
          <span class="p-input-icon-left w-full">
            <i class="pi pi-hashtag"></i>
            <input
              id="document"
              formControlName="document"
              type="text"
              pInputText
              autocomplete="off"
              lugoReactiveForm
              class="w-full"
            />
          </span>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section__label mb-3">
        <i class="pi pi-address-book mr-2"></i>
        <span>Datos personales</span>
      </div>
      <div class="grid formgrid p-fluid">
        <div class="field col-12 md:col-6">
          <label for="firstName" class="field-label">Nombre</label>
          <span class="p-input-icon-left w-full">
            <i class="pi pi-user"></i>
            <input
              id="firstName"
              formControlName="firstName"
              type="text"
              autocomplete="off"
              lugoReactiveForm
              pInputText
              class="w-full"
            />
          </span>
        </div>
        <div class="field col-12 md:col-6">
          <label for="lastName" class="field-label">Apellido</label>
          <span class="p-input-icon-left w-full">
            <i class="pi pi-user"></i>
            <input
              id="lastName"
              formControlName="lastName"
              type="text"
              pInputText
              lugoReactiveForm
              autocomplete="off"
              class="w-full"
            />
          </span>
        </div>
        <div class="field col-12 md:col-6">
          <label for="email" class="field-label">Email</label>
          <span class="p-input-icon-left w-full">
            <i class="pi pi-envelope"></i>
            <input
              id="email"
              formControlName="email"
              type="email"
              pInputText
              lugoReactiveForm
              autocomplete="off"
              class="w-full"
            />
          </span>
        </div>
        <div class="field col-12 md:col-6">
          <label for="phone" class="field-label">Teléfono</label>
          <span class="p-input-icon-left w-full">
            <i class="pi pi-phone"></i>
            <input
              id="phone"
              formControlName="phone"
              autocomplete="off"
              lugoReactiveForm
              type="tel"
              pInputText
              class="w-full"
            />
          </span>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section__label mb-3">
        <i class="pi pi-map-marker mr-2"></i>
        <span>Ubicación</span>
      </div>
      <div class="grid formgrid p-fluid">
        <div class="field col-12 md:col-8">
          <label for="address" class="field-label">Dirección</label>
          <span class="p-input-icon-left w-full">
            <i class="pi pi-home"></i>
            <input
              id="address"
              formControlName="address"
              type="text"
              autocomplete="off"
              lugoReactiveForm
              pInputText
              class="w-full"
            />
          </span>
        </div>
        <div class="field col-12 md:col-4">
          <label for="postalCode" class="field-label">Código postal</label>
          <span class="p-input-icon-left w-full">
            <i class="pi pi-map"></i>
            <input
              id="postalCode"
              formControlName="postalCode"
              type="text"
              pInputText
              autocomplete="off"
              lugoReactiveForm
              class="w-full"
            />
          </span>
        </div>
      </div>
    </div>

    <div class="form-section form-section--last">
      <div class="form-section__label mb-3">
        <i class="pi pi-cog mr-2"></i>
        <span>Configuración</span>
      </div>
      <div class="grid formgrid p-fluid">
        <div class="field col-12 md:col-8">
          <label for="channel" class="field-label">Canal</label>
          <p-dropdown
            inputId="channel"
            [options]="channels"
            appendTo="body"
            optionValue="id"
            formControlName="channel"
            optionLabel="name"
            placeholder="Seleccione un canal"
          ></p-dropdown>
        </div>

        <div class="field col-12 md:col-4 flex flex-column">
          <label class="field-label">Activo</label>
          <div class="flex align-items-center gap-2 mt-2">
            <p-inputSwitch
              formControlName="isActive"
              inputId="isActive"
            ></p-inputSwitch>
            <label for="isActive" class="text-sm text-500 cursor-pointer">
              {{ clientPresenter.Form.get("isActive")?.value ? "Sí" : "No" }}
            </label>
          </div>
        </div>
      </div>
    </div>
  </form>

  <!-- FOOTER -->
  <ng-template pTemplate="footer">
    <div class="dialog-footer">
      <button
        pButton
        pRipple
        [disabled]="isLoading"
        label="Cancelar"
        icon="pi pi-times"
        class="p-button-outlined p-button-secondary"
        (click)="close()"
      ></button>
      <button
        pButton
        pRipple
        [label]="client ? 'Actualizar' : 'Guardar'"
        [icon]="client ? 'pi pi-pencil' : 'pi pi-check'"
        [disabled]="clientPresenter.Invalid || isLoading"
        [loading]="isLoading"
        type="button"
        (click)="client ? updateClient() : saveClient()"
      ></button>
    </div>
  </ng-template>
</p-dialog>
