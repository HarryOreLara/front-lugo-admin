<p-table
  #dt1
  [value]="categories"
  dataKey="id"
  [rows]="10"
  [rowsPerPageOptions]="[10, 25, 50]"
  [loading]="isLoading"
  [paginator]="true"
  [tableStyle]="{ 'min-width': '75rem', 'font-size': '14px' }"
  [globalFilterFields]="['name', 'code', 'channel', 'status']"
>
  <ng-template pTemplate="caption">
    <div class="flex">
      <p-button
        label="Limpiar"
        icon="pi pi-filter-slash"
        (onClick)="clear(dt1)"
      />
      <span class="p-input-icon-left ml-auto">
        <i class="pi pi-search"></i>
        <input
          pInputText
          type="text"
          [(ngModel)]="searchValue"
          (input)="dt1.filterGlobal($event.target, 'contains')"
          placeholder="Buscar por palabra"
        />
      </span>
    </div>
  </ng-template>
  <ng-template pTemplate="header">
    <tr>
      <th style="min-width: 5rem">
        <div class="flex align-items-center">Id</div>
      </th>

      <th style="min-width: 10rem">
        <div class="flex align-items-center">Nombre</div>
      </th>
      <th style="min-width: 10rem">
        <div class="flex align-items-center">Estado</div>
      </th>
      <th style="min-width: 10rem">
        <div class="flex align-items-center">Codigo</div>
      </th>
      <th style="min-width: 10rem">
        <div class="flex align-items-center">Canal</div>
      </th>
      <th style="min-width: 10rem">
        <div class="flex align-items-center">Acciones</div>
      </th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-category let-rowIndex="rowIndex">
    <tr>
      <td>
        {{ rowIndex + 1 }}
      </td>
      <td>
        {{ category.name }}
      </td>
      <td>
        <p-tag
          [tagStatus]="category.status"
          class="text-white"
          [styleClass]="'text-white'"
        ></p-tag>
      </td>
      <td>
        {{ category.code }}
      </td>
      <td>
        {{ category.channel }}
      </td>
      <td>
        <!-- action-menu.component.html -->
        <div class="action-menu-container">
          <button
            #menuButton
            pButton
            pRipple
            type="button"
            icon="pi pi-ellipsis-v"
            class="p-button-text p-button-rounded"
            (click)="overlayPanel.toggle($event)"
            aria-haspopup="true"
            aria-label="Opciones"
          ></button>

          <p-overlayPanel #overlayPanel [appendTo]="'body'" (onHide)="onHide()">
            <div class="custom-menu">
              <button class="custom-menu-item">
                <i class="pi pi-pen-to-square"></i>
                <span>Actualizar</span>
              </button>

              <button class="custom-menu-item danger">
                <i class="pi pi-trash"></i>
                <span>Eliminar</span>
              </button>
            </div>
          </p-overlayPanel>
        </div>
      </td>
    </tr>
  </ng-template>
  <ng-template pTemplate="emptymessage">
    <tr>
      <td colspan="7">No categorys found.</td>
    </tr>
  </ng-template>
</p-table>
