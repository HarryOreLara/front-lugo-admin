<div class="col-12 surface-card shadow-2 border-round p-3">
  <div
    class="flex justify-content-between align-items-center border-bottom-1 mb-3 surface-border"
  >
    <span class="text-xl text-900 font-bold">Productos</span>
    <div>
      <button
        pButton
        pRipple
        icon="pi pi-ellipsis-v"
        class="p-button-text p-button-plain p-button-rounded"
      ></button>
    </div>
  </div>

  <div class="surface-card p-2 border-round">
    <div class="grid formgrid p-fluid">
      <div class="col-12 field mb-4 md:col-12">
        <p-autoComplete
          [suggestions]="filteredProducts"
          formControlName="product"
          (completeMethod)="filterProducts($event)"
          field="name"
          class="search-input w-full"
          placeholder="Buscar por SKU o Nombre del Producto..."
          [dropdown]="true"
        >
        </p-autoComplete>
      </div>

      <div class="cart-table">
        <div class="cart-header">
          <div class="col-product">PRODUCTO / SKU</div>
          <div class="col-qty">CANT.</div>
          <div class="col-price">PRECIO UNIT.</div>
          <div class="col-subtotal">SUBTOTAL</div>
          <div class="col-action"></div>
        </div>

        <div class="cart-body">
          <div class="cart-row" *ngFor="let item of cartItems">
            <div class="col-product">
              <span class="product-name">{{ item.name }}</span>
              <span class="product-sku">SKU: {{ item.sku }}</span>
            </div>

            <div class="col-qty">
              <div class="qty-control">
                <button
                  pButton
                  pRipple
                  type="button"
                  label="-"
                  class="qty-btn p-button-outlined p-button-secondary"
                  (click)="decreaseQty(item)"
                ></button>
                <span class="qty-value">{{ item.quantity }}</span>
                <button
                  pButton
                  pRipple
                  type="button"
                  label="+"
                  class="qty-btn p-button-outlined p-button-secondary"
                  (click)="increaseQty(item)"
                ></button>
              </div>
            </div>

            <div class="col-price">
              <span class="price-label">S/</span>
              <span class="price-value">{{
                item.unitPrice | number: "1.2-2"
              }}</span>
            </div>

            <div class="col-subtotal">
              <span class="subtotal-label">S/</span>
              <span class="subtotal-value">{{
                item.quantity * item.unitPrice | number: "1.2-2"
              }}</span>
            </div>

            <div class="col-action">
              <button
                pButton
                pRipple
                type="button"
                icon="pi pi-trash"
                class="p-button-text p-button-secondary delete-btn"
                (click)="removeItem(item)"
              ></button>
            </div>
          </div>

          <!-- EMPTY STATE -->
          <div class="cart-empty" *ngIf="cartItems.length === 0">
            <i class="pi pi-shopping-cart"></i>
            <span>El carrito está vacío</span>
          </div>
        </div>

        <div class="cart-footer" *ngIf="cartItems.length > 0">
          <button
            pButton
            pRipple
            type="button"
            icon="pi pi-refresh"
            label="Limpiar Carrito"
            class="p-button-text p-button-secondary clear-btn"
            (click)="clearCart()"
          ></button>
        </div>
      </div>
    </div>
  </div>
</div>
