        <div class="col-12 surface-card shadow-2 border-round p-3 mb-4">
          <div
            class="flex justify-content-between align-items-center border-bottom-1 mb-3 surface-border"
          >
            <span class="text-xl text-900 font-bold">Datos del cliente</span>
            <div>
              <button
                pButton
                pRipple
                label="Nuevo cliente"
                icon="pi pi-plus"
                class="p-button-text p-button-plain p-button-rounded"
              ></button>
            </div>
          </div>

          <div class="surface-card p-2 border-round">
            <div class="grid formgrid p-fluid">
              <div class="field mb-4 col-12 md:col-4">
                <label for="country2" class="font-medium text-900"
                  >Tipo de documento</label
                >
                <p-dropdown
                  inputId="typeDocument"
                  [options]="[]"
                  optionLabel="name"
                  [filter]="true"
                  filterBy="name"
                  [showClear]="true"
                  placeholder="Seleccione un documento"
                >
                </p-dropdown>
              </div>

              <div class="field mb-4 col-12 md:col-8">
                <label for="document" class="font-medium text-900"
                  >Documento</label
                >
                <input
                  id="document"
                  type="text"
                  pInputText
                  placeholder="Ingrese un documento de identitdad"
                />
              </div>

              <div class="field mb-4 col-12 md:col-12">
                <div
                  class="flex align-items-start p-4 bg-blue-100 border-round border-1 border-blue-300"
                >
                  <i class="pi pi-check-circle text-blue-900 text-2xl mr-3"></i>
                  <div class="mr-3">
                    <div
                      class="text-blue-900 font-medium text-xl mb-2 line-height-1"
                    >
                      Success
                    </div>
                    <p class="m-0 p-0 text-blue-700 line-height-3">
                      Quis commodo odio aenean sed adipiscing diam. Bibendum
                      enim facilisis gravida neque convallis a cras semper.
                    </p>
                  </div>
                  <div class="ml-auto">
                    <a
                      pRipple
                      class="inline-flex align-items-center justify-content-center ml-auto border-circle hover:bg-blue-50 no-underline cursor-pointer transition-colors transition-duration-150"
                      style="width: 1.5rem; height: 1.5rem"
                    >
                      <i class="pi pi-times text-blue-900"></i>
                    </a>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
