<div class="col-12 surface-card shadow-2 border-round p-3 mb-4">
  <div
    class="flex justify-content-between align-items-center border-bottom-1 mb-3 surface-border"
  >
    <span class="text-xl text-900 font-bold">Datos del cliente</span>
    <div>
      <button
        pButton
        pRipple
        label="Nuevo cliente"
        icon="pi pi-plus"
        class="p-button-text p-button-plain p-button-rounded"
      ></button>
    </div>
  </div>

  <div class="surface-card p-2 border-round">
    <form
      class="grid formgrid p-fluid"
      [formGroup]="purchaseDataClientPresenter.Form"
    >
      <div class="field mb-4 col-12 md:col-4">
        <label for="documentType" class="font-medium text-900"
          >Tipo de documento</label
        >
        <p-dropdown
          inputId="typeDocument"
          [options]="documentsType"
          optionLabel="name"
          optionValue="id"
          formControlName="typeDocument"
          placeholder="Seleccione un documento"
        >
        </p-dropdown>
      </div>

      <div class="field mb-4 col-12 md:col-8">
        <label for="document" class="font-medium text-900">Documento</label>
        <input
          id="document"
          lugoReactiveForm
          autocomplete="off"
          type="text"
          formControlName="document"
          pInputText
          (keyup.enter)="searchClient()"
          placeholder="Ingrese un documento de identitdad"
        />
      </div>

<div class="field mb-4 col-12 md:col-12" *ngIf="client.id">
  <div class="flex align-items-center gap-3 p-3 border-round-lg border-1 border-blue-200 bg-blue-50">
    <div class="flex align-items-center justify-content-center border-circle bg-blue-100"
         style="width: 2.5rem; height: 2.5rem; flex-shrink: 0;">
      <i class="pi pi-user text-blue-600 text-lg"></i>
    </div>
    <div class="flex-1">
      <div class="text-blue-700 text-xs font-medium mb-1 uppercase" style="letter-spacing: 0.05em;">
        Cliente encontrado
      </div>
      <div class="text-900 font-medium">
        {{ client.firstName }} {{ client.lastName }}
        <span class="text-500 font-normal ml-2 text-sm">{{ client.typeDocument }} {{ client.document }}</span>
      </div>
    </div>
    <span class="px-2 py-1 border-round text-xs font-medium bg-blue-100 text-green-700">
      Activo
    </span>
  </div>
</div>
    </form>
  </div>
</div>
