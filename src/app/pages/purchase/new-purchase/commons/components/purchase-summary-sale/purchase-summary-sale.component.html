<form
  class="surface-card border-round shadow-2 p-5 ml-3"
  [formGroup]="purchaseFormPresenter.Form"
>
  <div
    class="flex justify-content-between align-items-center border-bottom-1 pb-3 surface-border"
  >
    <span class="text-900 font-medium text-lg lg:text-xl"
      ><i class="pi pi-shopping-cart text-xl mr-2"></i>Resumen de venta</span
    >
    <a
      tabindex="0"
      class="text-600 font-medium cursor-pointer hover:text-primary"
    ></a>
  </div>

  <div class="flex align-items-center justify-content-between mb-5 mt-5">
    <span class="text-900 font-medium text-3xl block">{{
      totalCartItem | currencyLugo
    }}</span>
    <div class="flex align-items-center">
      <span class="text-sm"
        ><b class="text-900 mr-1">{{ cartItems.length }}</b>
        <span class="text-500"></span>productos</span
      >
    </div>
  </div>

  <div class="py-2 mt-3 border-bottom-1 surface-border">
    <div class="flex justify-content-between align-items-center mb-3">
      <span class="text-900">Subtotal</span>
      <span class="text-900">{{ totalCartItem | currencyLugo }}</span>
    </div>
    <div class="flex justify-content-between align-items-center mb-3">
      <span class="text-900">Delivery</span>
      <span class="text-900">Gratis</span>
    </div>
    <div class="flex justify-content-between align-items-center mb-3">
      <span class="text-900">Total</span>
      <span class="text-900 font-bold">{{ totalCartItem | currencyLugo }}</span>
    </div>
  </div>

  <div class="py-2 mt-3 border-bottom-1 surface-border">
    <div class="mb-3 flex align-items-center justify-content-between">
      <span class="font-bold text-900">Tipo de comprobante</span>
    </div>
    <div class="grid grid-nogutter align-items-center mb-5">
      <div
        *ngFor="let tipo of invoiceTypes"
        class="col h-3rem border-1 border-300 text-900 inline-flex justify-content-center align-items-center flex-shrink-0 border-round mr-3 cursor-pointer hover:surface-100 transition-duration-150 transition-colors"
        [ngClass]="{
          'border-blue-500 border-2 text-blue-500':
            purchaseFormPresenter.invoiceType.value === tipo.id,
        }"
        (click)="purchaseFormPresenter.invoiceType.setValue(tipo.id)"
      >
        {{ tipo.name }}
      </div>
    </div>
  </div>

  <div class="py-2 mt-3 border-bottom-1 surface-border">
    <div class="mb-3 flex align-items-center justify-content-between">
      <span class="font-bold text-900">Método de pago</span>
    </div>
    <div class="grid grid-nogutter align-items-center mb-5">
      <div
        *ngFor="let metodo of methodPayments"
        class="col h-3rem border-1 border-300 text-900 inline-flex justify-content-center align-items-center flex-shrink-0 border-round mr-3 cursor-pointer hover:surface-100 transition-duration-150 transition-colors"
        [ngClass]="{
          'border-blue-500 border-2 text-blue-500':
            purchaseFormPresenter.methodPayment.value === metodo.id,
        }"
        (click)="purchaseFormPresenter.methodPayment.setValue(metodo.id)"
      >
        {{ metodo.name }}
      </div>
    </div>
  </div>

  <div class="py-2 mt-3 border-bottom-1 surface-border">
    <div class="surface-card p-2 border-round">
      <div class="grid formgrid p-fluid">
        <div class="field mb-4 col-12 md:col-6">
          <label for="currency" class="font-medium text-900">Moneda</label>
          <p-dropdown
            inputId="currency"
            formControlName="currency"
            [options]="currencys"
            optionLabel="name"
            optionValue="id"
            placeholder="Selecciona una moneda"
          ></p-dropdown>
        </div>

        <div class="field mb-4 col-12 md:col-6">
          <label for="voucher" class="font-medium text-900">Voucher</label>
          <input
            id="voucher"
            type="text"
            pInputText
            formControlName="voucher"
          />
        </div>
      </div>
      <button
        pButton
        type="button"
        [disabled]="disableNewPurchase"
        label="Finalizar & emitir"
        (click)="newPurchase()"
        class="p-button-primary w-full mt-3"
      ></button>
      <button
        pButton
        pRipple
        type="button"
        label="Cancelar operación"
        class="w-full mt-3 bg-red-500"
      ></button>
    </div>
  </div>
</form>
