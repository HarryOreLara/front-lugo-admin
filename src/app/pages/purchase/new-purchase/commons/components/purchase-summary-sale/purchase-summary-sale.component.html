      <div class="surface-card border-round shadow-2 p-5 ml-3">
        <div
          class="flex justify-content-between align-items-center border-bottom-1 pb-3 surface-border"
        >
          <span class="text-900 font-medium text-lg lg:text-xl"
            ><i class="pi pi-shopping-cart text-xl mr-2"></i>Resumen de
            venta</span
          >
          <a
            tabindex="0"
            class="text-600 font-medium cursor-pointer hover:text-primary"
            >Edit Cart</a
          >
        </div>

        <div class="flex align-items-center justify-content-between mb-5 mt-5">
          <span class="text-900 font-medium text-3xl block">$120</span>
          <div class="flex align-items-center">
            <span class="text-sm"
              ><b class="text-900 mr-1">24</b>
              <span class="text-500"></span>productos</span
            >
          </div>
        </div>

        <div class="py-2 mt-3 border-bottom-1 surface-border">
          <div class="flex justify-content-between align-items-center mb-3">
            <span class="text-900">Subtotal</span>
            <span class="text-900">$12.00</span>
          </div>
          <div class="flex justify-content-between align-items-center mb-3">
            <span class="text-900">Shipping</span>
            <span class="text-900">Free</span>
          </div>
          <div class="flex justify-content-between align-items-center mb-3">
            <span class="text-900">Total</span>
            <span class="text-900 font-bold">$12.00</span>
          </div>
        </div>

        <div class="py-2 mt-3 border-bottom-1 surface-border">
          <div class="mb-3 flex align-items-center justify-content-between">
            <span class="font-bold text-900">Tipo de comprobante</span>
            <a
              tabindex="0"
              class="cursor-pointer text-600 text-sm flex align-items-center"
              >Size Guide <i class="ml-1 pi pi-angle-right"></i
            ></a>
          </div>
          <div class="grid grid-nogutter align-items-center mb-5">
            <div
              class="col h-3rem border-1 border-300 text-900 inline-flex justify-content-center align-items-center flex-shrink-0 border-round mr-3 cursor-pointer hover:surface-100 transition-duration-150 transition-colors"
              [ngClass]="{
                'border-blue-500 border-2 text-blue-500': size3 === 'XS',
              }"
              (click)="size3 = 'XS'"
            >
              Boleta
            </div>
            <div
              class="col h-3rem border-1 border-300 text-900 inline-flex justify-content-center align-items-center flex-shrink-0 border-round mr-3 cursor-pointer hover:surface-100 transition-duration-150 transition-colors"
              [ngClass]="{
                'border-blue-500 border-2 text-blue-500': size3 === 'S',
              }"
              (click)="size3 = 'S'"
            >
              Factura
            </div>
          </div>
        </div>

        <div class="py-2 mt-3 border-bottom-1 surface-border">
          <div class="mb-3 flex align-items-center justify-content-between">
            <span class="font-bold text-900">Método de pago</span>
            <a
              tabindex="0"
              class="cursor-pointer text-600 text-sm flex align-items-center"
              >Size Guide <i class="ml-1 pi pi-angle-right"></i
            ></a>
          </div>
          <div class="grid grid-nogutter align-items-center mb-5">
            <div
              class="col h-3rem border-1 border-300 text-900 inline-flex justify-content-center align-items-center flex-shrink-0 border-round mr-3 cursor-pointer hover:surface-100 transition-duration-150 transition-colors"
              [ngClass]="{
                'border-blue-500 border-2 text-blue-500': size3 === 'XS',
              }"
              (click)="size3 = 'XS'"
            >
              Efectivo
            </div>
            <div
              class="col h-3rem border-1 border-300 text-900 inline-flex justify-content-center align-items-center flex-shrink-0 border-round mr-3 cursor-pointer hover:surface-100 transition-duration-150 transition-colors"
              [ngClass]="{
                'border-blue-500 border-2 text-blue-500': size3 === 'S',
              }"
              (click)="size3 = 'S'"
            >
              Tarjeta
            </div>
            <div
              class="col h-3rem border-1 border-300 text-900 inline-flex justify-content-center align-items-center flex-shrink-0 border-round mr-3 cursor-pointer hover:surface-100 transition-duration-150 transition-colors"
              [ngClass]="{
                'border-blue-500 border-2 text-blue-500': size3 === 'M',
              }"
              (click)="size3 = 'M'"
            >
              Transferencia
            </div>
            <div
              class="col h-3rem border-1 border-300 text-900 inline-flex justify-content-center align-items-center flex-shrink-0 border-round mr-3 cursor-pointer hover:surface-100 transition-duration-150 transition-colors"
              [ngClass]="{
                'border-blue-500 border-2 text-blue-500': size3 === 'L',
              }"
              (click)="size3 = 'L'"
            >
              Yape / Plin
            </div>
          </div>
        </div>

        <div class="py-2 mt-3 border-bottom-1 surface-border">
          <div class="surface-card p-2 border-round">
            <div class="grid formgrid p-fluid">
              <div class="field mb-4 col-12 md:col-6">
                <label for="currency" class="font-medium text-900"
                  >Moneda</label
                >
                <p-dropdown
                  inputId="typeDocument"
                  [options]="[]"
                  optionLabel="name"
                  [filter]="true"
                  filterBy="name"
                  [showClear]="true"
                  placeholder="Select a Country"
                >
                </p-dropdown>
              </div>

              <div class="field mb-4 col-12 md:col-6">
                <label for="document" class="font-medium text-900"
                  >Voucher</label
                >
                <input id="document" type="text" pInputText />
              </div>
            </div>
            <button
              pButton
              class="p-button-primary"
              label="Finalizar & emitir"
              class="w-full mt-3"
            ></button>
            <button
              pButton
              pRipple
              label="Cancelar operación"
              class="w-full mt-3 bg-red-500"
            ></button>
          </div>
        </div>
      </div>
