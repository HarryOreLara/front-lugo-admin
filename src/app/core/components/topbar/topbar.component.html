<div
  class="flex justify-content-between align-items-center px-5 bg-white-alpha-90 border-bottom-1 relative lg:static border-white-alpha-10"
  style="height: 60px"
>
  <div class="flex">
    <a
      pRipple
      class="cursor-pointer inline-flex align-items-center justify-content-center lg:hidden text-gray-300 mr-3"
      pStyleClass="#app-sidebar-8"
      enterClass="hidden"
      enterActiveClass="fadeinleft"
      leaveToClass="hidden"
      leaveActiveClass="fadeoutleft"
      [hideOnOutsideClick]="true"
    >
      <i class="pi pi-bars text-4xl"></i>
    </a>
  </div>
  <a
    pRipple
    class="cursor-pointer block lg:hidden text-gray-300"
    pStyleClass="@next"
    enterClass="hidden"
    enterActiveClass="fadein"
    leaveToClass="hidden"
    leaveActiveClass="fadeout"
    [hideOnOutsideClick]="true"
  >
    <i class="pi pi-ellipsis-v text-2xl"></i>
  </a>
  <ul
    class="list-none p-0 m-0 hidden lg:flex lg:align-items-center select-none lg:flex-row right-0 top-100 z-1 shadow-2 lg:shadow-none absolute lg:static px-3 py-3 lg:py-0 mr-3 lg:mr-0"
    style="
      background-image: linear-gradient(60deg, #29323c 0%, #485563 100%);
      border-radius: 30px;
    "
  >
    <li class="mr-0 lg:mr-3">
      <a
        pRipple
        class="flex p-3 lg:p-2 align-items-center text-gray-300 hover:bg-bluegray-700 font-medium cursor-pointer transition-duration-150 transition-colors"
        style="border-radius: 30px"
      >
        <i class="pi pi-inbox text-base lg:text-2xl mr-2 lg:mr-0"></i>
        <span class="block lg:hidden font-medium">Inbox</span>
      </a>
    </li>
    <li class="mr-0 lg:mr-3">
      <a
        pRipple
        class="flex p-3 lg:p-2 align-items-center text-gray-300 hover:bg-bluegray-700 font-medium cursor-pointer transition-duration-150 transition-colors"
        style="border-radius: 30px"
      >
        <i
          class="pi pi-bell text-base lg:text-2xl mr-2 lg:mr-0"
          pBadge
          severity="danger"
        ></i>
        <span class="block lg:hidden font-medium">Notifications</span>
      </a>
    </li>
    <li
      class="border-top-1 lg:border-top-none lg:mt-0 mt-2 lg:pt-0 pt-2 border-white-alpha-10"
    >
      <a
        pRipple
        class="flex p-3 lg:p-2 align-items-center hover:bg-bluegray-700 font-medium cursor-pointer transition-duration-150 transition-colors"
        style="border-radius: 30px"
      >
        <img
          src="assets/images/blocks/avatars/circle/avatar-f-1.png"
          class="mr-3 lg:mr-0"
          style="width: 32px; height: 32px"
        />
        <div class="block lg:hidden">
          <div class="text-gray-300 font-medium">Josephine Lillard</div>
          <span class="text-gray-500 font-medium text-sm"
            >Marketing Specialist</span
          >
        </div>
      </a>
    </li>
  </ul>
</div>
